<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <aside>
      <div id="banner">
        <img src="images/odin-logo.png" width="70px" />
        <h1 class="logo-header">ODIN</h1>
      </div>
      <p class="photo-creds">
        Photo by
        <a
          href="https://unsplash.com/@bananablackcat?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText"
          >Svetlana Gumerova</a
        >
        on
        <a
          href="https://unsplash.com/photos/temple-near-trees-during-day-PMkQ7WVWqr0?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText"
          >Unsplash</a
        >
      </p>
    </aside>
    <main>
      <p>This is a test sign-form. Sign up <em>now</em> to get started</p>
      <div id="form-container">
        <form class="sign-up-form">
          <div class="form-group">
            <label for="fname">First Name</label>
            <input id="fname" name="fname" type="text" />
          </div>

          <div class="form-group">
            <label for="lname">Last Name</label>
            <input id="lname" name="lname" type="text" />
          </div>

          <div class="form-group">
            <label row="email">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              placeholder="santiago@example.com"
            />
          </div>

          <div class="form-group">
            <label row="password">Password</label>
            <input id="password" name="password" type="password" />
          </div>

          <div class="form-group">
            <label row="confpassword">Confirm Password</label>
            <input id="confpassword" name="confpassword" type="password" />
          </div>
        </form>
      </div>

      <button>Create Account</button>
      <p>Already have an account? <a href="#">Log in</a></p>
    </main>
  </body>
</html>
